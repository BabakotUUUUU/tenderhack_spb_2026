services:
  # ─── SearXNG (self-hosted поисковый агрегатор для 4-го источника) ──────────
  # Полностью open-source, бесплатный, self-hosted
  # Агрегирует DuckDuckGo, Bing, Google без API-ключей
  searxng:
    image: searxng/searxng:latest
    container_name: tenderhack_searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - tenderhack_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderhack_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    depends_on:
      searxng:
        condition: service_healthy
    networks:
      - tenderhack_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenderhack_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tenderhack_net

networks:
  tenderhack_net:
    driver: bridge
