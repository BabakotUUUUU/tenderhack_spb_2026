services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderhack_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - PROXY_URL=${PROXY_URL:-}
      - PROXY_LIST=${PROXY_LIST:-}
    networks:
      - tenderhack_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenderhack_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tenderhack_net

networks:
  tenderhack_net:
    driver: bridge

