services:
  # ─── Backend (FastAPI + Playwright + Crawler + SQLite) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenderhack_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-1200}
      - PARSER_TIMEOUT_SECONDS=${PARSER_TIMEOUT_SECONDS:-35}
      - CRAWLER_DB_PATH=/data/runet_index.db
      - CRAWLER_MAX_PAGES_PER_DOMAIN=${CRAWLER_MAX_PAGES_PER_DOMAIN:-20}
      - CRAWLER_WORKERS=${CRAWLER_WORKERS:-3}
    volumes:
      - crawler_data:/data
    networks:
      - tenderhack_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenderhack_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tenderhack_net

volumes:
  crawler_data:
    driver: local

networks:
  tenderhack_net:
    driver: bridge
